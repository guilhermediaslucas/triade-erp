# TRIADE ERP — nginx para servir o front (apps/web/dist) num servidor/VM próprio.
# Hoje o front roda no Cloudflare Pages (que já serve estático com fallback de SPA).
# Use este arquivo SE/QUANDO passar a hospedar o front você mesmo com nginx.
#
# Build do front:
#   - Para usar o proxy /api abaixo:  VITE_API_URL=/api  npm run build -w @triade/web
#   - Ou aponte direto p/ a API (sem proxy): VITE_API_URL=https://triade-api.onrender.com
#
# Copie apps/web/dist para /var/www/triade/dist e recarregue o nginx.

server {
  listen 80;
  server_name triadeerp.com.br www.triadeerp.com.br;

  root /var/www/triade/dist;
  index index.html;

  # ---- Cabeçalhos de segurança (espelham os da API) ----
  add_header X-Content-Type-Options "nosniff" always;
  add_header X-Frame-Options "DENY" always;
  add_header Referrer-Policy "no-referrer" always;
  # Habilite o HSTS só depois que o HTTPS estiver ativo (TLS/cert):
  # add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

  # ---- Compressão ----
  gzip on;
  gzip_comp_level 5;
  gzip_min_length 1024;
  gzip_types text/css application/javascript application/json image/svg+xml application/xml;

  # ---- Assets com hash no nome → cache longo e imutável ----
  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
  }

  # ---- Proxy da API (quando o front é buildado com VITE_API_URL=/api) ----
  location /api/ {
    proxy_pass https://triade-api.onrender.com/;
    proxy_http_version 1.1;
    proxy_set_header Host triade-api.onrender.com;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_ssl_server_name on;
  }

  # ---- SPA: qualquer rota cai no index.html (React Router) ----
  location / {
    try_files $uri $uri/ /index.html;
    # index.html nunca em cache (sempre pega a versão nova)
    add_header Cache-Control "no-store";
  }
}
